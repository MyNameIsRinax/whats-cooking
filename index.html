<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What's Cooking? — Cuisine Predictor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">

    <header>
      <h1>What's <span>Cooking?</span></h1>
      <p>Enter your ingredients — the model predicts your cuisine.</p>
    </header>

    <div class="card">
      <label class="label">Add ingredient</label>
      <div class="input-row">
        <input type="text" id="ingredientInput"
               placeholder="e.g. garlic, olive oil, soy sauce…"
               autocomplete="off" />
        <button class="btn btn-add" onclick="addIngredient()">+ Add</button>
      </div>

      <div class="tags-wrap" id="tagsWrap">
        <span class="tags-empty" id="tagsEmpty">Your ingredients appear here</span>
      </div>

      <label class="label">Quick add</label>
      <div class="chips">
        <button class="chip" onclick="quickAdd('garlic')">garlic</button>
        <button class="chip" onclick="quickAdd('olive oil')">olive oil</button>
        <button class="chip" onclick="quickAdd('soy sauce')">soy sauce</button>
        <button class="chip" onclick="quickAdd('ginger')">ginger</button>
        <button class="chip" onclick="quickAdd('cumin')">cumin</button>
        <button class="chip" onclick="quickAdd('tomatoes')">tomatoes</button>
        <button class="chip" onclick="quickAdd('fish sauce')">fish sauce</button>
        <button class="chip" onclick="quickAdd('cilantro')">cilantro</button>
        <button class="chip" onclick="quickAdd('butter')">butter</button>
        <button class="chip" onclick="quickAdd('chili pepper')">chili pepper</button>
        <button class="chip" onclick="quickAdd('coconut milk')">coconut milk</button>
        <button class="chip" onclick="quickAdd('miso')">miso</button>
        <button class="chip" onclick="quickAdd('turmeric')">turmeric</button>
        <button class="chip" onclick="quickAdd('parmesan')">parmesan</button>
        <button class="chip" onclick="quickAdd('jalapeño')">jalapeño</button>
        <button class="chip" onclick="quickAdd('rice vinegar')">rice vinegar</button>
        <button class="chip" onclick="quickAdd('lemongrass')">lemongrass</button>
        <button class="chip" onclick="quickAdd('paprika')">paprika</button>
      </div>

      <button class="btn btn-predict" id="predictBtn" onclick="predict()">
        <span id="btnText">Predict Cuisine</span>
        <span class="dots" id="loadingDots">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </span>
      </button>

      <div class="error" id="errorBox"></div>
    </div>

    <div class="result" id="resultPanel">
      <div class="result-eyebrow">Predicted Cuisine</div>
      <div class="result-cuisine" id="resultCuisine"></div>
      <hr class="result-divider" />
      <div class="conf-label">Top candidates</div>
      <div class="conf-list" id="confList"></div>
    </div>
  </div>

  <!-- model.js is generated by the notebook's export cell -->
  <script src="model.js"></script>
  <script src="app.js"></script>
</body>
</html>
